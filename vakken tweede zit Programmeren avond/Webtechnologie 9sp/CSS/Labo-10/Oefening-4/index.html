<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css"> 

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">

    <title>Oefening-4</title>
</head>
<body>
    <main>
        <form action="">
            <div class="inlog-logo">
                <img src="./image/logoipsum-365.png" alt="logo">
                <h2>Music streaming</h2>
            </div>
            
            <fieldset id="streamingApps">
                <legend>Selecteer je streamingdiensten</legend>
                <label for="Spotify" class="music"><input type="radio" name="stream" id="Spotify" title="Spotify">Spotify</label>
                <label for="YTMusic" class="music"><input type="radio" name="stream" id="YTMusic" title="YouTube-Music">YouTubeMusic</label>
                <label for="Deezer" class="music"><input type="radio" name="stream" id="Deezer" title="Deezer">Deezer</label>
                <label for="Tidal" class="music"><input type="radio" name="stream" id="Tidal" placeholder="Tidal">Tidal</label>
                <label for="SoundCloud" class="music"><input type="radio" name="stream" id="SoundCloud" placeholder="SoundCloud">SoundCloud</label>
            </fieldset>
            
            <input type="button" value="Verzend" id="button-Upload">
        </form>
    </main>
</body>
</html>
