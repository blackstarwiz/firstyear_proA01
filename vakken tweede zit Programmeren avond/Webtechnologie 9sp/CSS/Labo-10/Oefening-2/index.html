<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css"> 

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">

    <title>Oefening-2</title>
</head>
<body>
    <main>
        <form action="">
            <div class="inlog-logo">
                <img src="./image/logoipsum-365.png" alt="logo">
                <h2>KeuzeStress</h2>
            </div>
            <fieldset id="programmeertaal">
                <legend>Favoriete programmeertaal</legend>

                
                <label for="C#">
                    <input type="radio" name="language"  id="C#-Radio">
                    <span class="checkmark">
                </span>
                C#
                </label>

                
                <label for="Javascript"><input type="radio" name="language"  id="Javascript-Radio" title="Javascript"><span class="checkmark"></span> Javascript</label>

                
                <label for="Typescript"><input type="radio" name="language"  id="Typescript-Radio" title="Typescript"><span class="checkmark"></span> Typescript</label>

                
                <label for="PHP"><input type="radio" name="language"  id="PHP-Radio" title="PHP"><span class="checkmark"></span> PHP</label>
            </fieldset>
            <fieldset id="IDE">
                <legend>Favoriete IDE</legend>
                
                <label for="VS-code"><input type="radio" name="IDE" id="VS-radio" title="VS-code"><span class="checkmark"></span>Visual Studio Code</label>

                <label for="WebStorm"><input type="radio" name="IDE" id="WEB-radio" title="WebStorm"><span class="checkmark"></span>WebStorm</label>

                <label for="Vim"><input type="radio" name="IDE" id="Vim-radio" title="Vim"><span class="checkmark"></span>Vim</label>

                <label for="PHPStorm"><input type="radio" name="IDE" id="PHPStorm-radio" title="PHPStorm"><span class="checkmark"></span>PHPStorm</label>
            </fieldset>
            <input type="button" value="Bevestig je keuze" id="button-inloggen">
        </form>
    </main>
</body>
</html>
